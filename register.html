<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeticWars - Registration Hub</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a1f0f; font-family: -apple-system, sans-serif; color: white; padding: 20px; }
  h1 { font-size: 26px; margin-bottom: 4px; text-align: center; }
  .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; text-align: center; }
  .step { display: none; width: 100%; max-width: 360px; flex-direction: column; gap: 12px; }
  .step.active { display: flex; }
  .field-label { font-size: 12px; color: #8fd68f; margin-bottom: 2px; margin-left: 2px; }
  .input-wrap { position: relative; display: flex; align-items: center; }
  input, select { width: 100%; background: #16241a; border: 1px solid #2d4030; border-radius: 10px; padding: 14px; color: white; font-size: 16px; }
  .toggle-pw { position: absolute; right: 12px; cursor: pointer; font-size: 18px; color: #666; }
  .choice-card { background: #16241a; border: 2px solid #2d4030; border-radius: 14px; padding: 20px; cursor: pointer; text-align: center; margin-bottom: 12px; }
  .error { color: #ff6b6b; font-size: 13px; text-align: center; }
  .status { color: #ab9ff2; font-size: 14px; text-align: center; }
  button { background: linear-gradient(135deg, #ab9ff2, #6c4fd6); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
</style>
</head>
<body>

<h1>🪖 MemeticWars</h1>
<p class="subtitle">Create your account</p>

<div class="step active" id="step0">
  <div class="choice-card" id="choice-free">
    <div class="choice-title">Standard Account</div>
    <div class="choice-desc">No wallet required.</div>
  </div>
  <div class="choice-card" id="choice-web3">
    <div class="choice-title">Web3 Account</div>
    <div class="choice-desc">Connect Phantom Wallet.</div>
  </div>
  <div class="error" id="step0-error"></div>
</div>

<div class="step" id="step1">
  <div class="field-label">Username</div><input type="text" id="username">
  <div class="field-label">Email</div><input type="email" id="email">
  <div class="field-label">Password</div>
  <div class="input-wrap"><input type="password" id="password"><span class="toggle-pw" id="toggle-pw1">👁</span></div>
  <div class="field-label">Confirm</div>
  <div class="input-wrap"><input type="password" id="confirm-password"><span class="toggle-pw" id="toggle-pw2">👁</span></div>
  <div class="field-label">Date of Birth</div><input type="date" id="dob">
  <button id="register-btn">Complete Registration</button>
  <button id="back-step0-btn" style="background:none;">Back</button>
  <div class="status" id="status-text"></div>
</div>

<div class="step" id="step2">
  <div style="text-align:center;">✅</div>
  <p id="success-title"></p>
  <button onclick="window.location.href='memeticwars://onconnect'">Return to Game</button>
</div>

<script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
<script>
  const NAKAMA_URL = "https://creature-visiting-playback.ngrok-free.dev";
  let isWeb3Mode = false;

  function goToStep(s) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    document.getElementById('step' + s).classList.add('active');
  }

  document.getElementById('choice-free').addEventListener('click', () => { isWeb3Mode = false; goToStep(1); });
  document.getElementById('choice-web3').addEventListener('click', () => { 
    isWeb3Mode = true; 
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile && !window.solana?.isPhantom) {
      window.location.href = "https://phantom.app/ul/browse/" + encodeURIComponent(window.location.href);
    } else { goToStep(1); }
  });

  document.getElementById('register-btn').addEventListener('click', async () => {
    const statusEl = document.getElementById('status-text');
    statusEl.textContent = 'Processing...';
    try {
      // 1. Auth simple (simulación de flujo)
      const res = await fetch(`${NAKAMA_URL}/v2/account/authenticate/email?create=true`, {
        method: 'POST',
        headers: { 'Authorization': 'Basic ' + btoa('defaultkey:'), 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      if (!res.ok) throw new Error("Server connection failed.");
      
      if (isWeb3Mode) {
        const provider = window.solana || window.phantom?.solana;
        await provider.connect();
        // Aquí iría la lógica de firma
      }
      goToStep(2);
    } catch (e) { statusEl.textContent = e.message; }
  });
</script>
</body>
</html>
