<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memetic Wars - Registro Web3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@heroiclabs/nakama-js@2.6.0/dist/nakama-js.umd.js"></script>
    
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #512da8;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 20px;
        }
        button:hover {
            background-color: #673ab7;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #a1a1aa;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Fase 1: Conexión Web3</h2>
        <p>Conecta tu wallet para validar tus cartas y acceder al juego.</p>
        
        <button id="connectBtn">Conectar Phantom Wallet</button>
        <p id="status">Esperando interacción...</p>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DEL CLIENTE DE NAKAMA (NGROK)
        // ==========================================
        const client = new nakamajs.Client(
            "defaultkey",                                // Tu Server Key de Nakama
            "creature-visiting-playback.ngrok-free.dev", // Tu host de Ngrok (sin https://)
            "443",                                       // Puerto seguro HTTPS para Ngrok
            true                                         // Forzar uso de SSL/TLS
        );

        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('status');

        // ==========================================
        // 2. FLUJO DE AUTENTICACIÓN
        // ==========================================
        connectBtn.addEventListener('click', async () => {
            statusText.innerText = "Buscando extensión de Phantom...";
            statusText.style.color = "#a1a1aa";

            // Verificar si Phantom está inyectado en el navegador
            const isPhantomInstalled = window.solana && window.solana.isPhantom;

            if (!isPhantomInstalled) {
                statusText.innerText = "❌ Phantom Wallet no detectada. Por favor instálala.";
                statusText.style.color = "#ef4444";
                window.open("https://phantom.app/", "_blank");
                return;
            }

            try {
                statusText.innerText = "Solicitando conexión a la wallet...";
                
                // Conectar a la billetera Solana
                const walletResponse = await window.solana.connect();
                const walletAddress = walletResponse.publicKey.toString();
                
                // Mostrar Address recortada en la interfaz
                statusText.innerText = `Wallet detectada: ${walletAddress.substring(0, 6)}...${walletAddress.substring(walletAddress.length - 4)}`;
                
                statusText.innerText = "Registrando usuario en Nakama...";

                // Autenticar en Nakama usando la Address de Solana como Custom ID.
                // El segundo parámetro 'true' le dice a Nakama que si el usuario no existe, lo cree (registro automático).
                // El tercer parámetro asigna la Address como su nombre de usuario inicial.
                const session = await client.authenticateCustom(walletAddress, true, walletAddress);
                
                console.log("Sesión de Nakama creada con éxito:", session);
                
                statusText.innerText = "🚀 ¡Conexión exitosa! Nakama ha registrado tu cuenta.";
                statusText.style.color = "#22c55e";

                // NOTA: Aquí es donde pasarías el token de sesión ('session.token') al resto del juego 
                // o harías la llamada RPC para validar los NFTs del usuario en tu backend.

            } catch (error) {
                console.error("Error en el flujo Web3:", error);
                statusText.innerText = `❌ Error: ${error.message || error}`;
                statusText.style.color = "#ef4444";
            }
        });
    </script>
</body>
</html>
