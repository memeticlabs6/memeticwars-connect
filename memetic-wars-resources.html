<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeticWars - Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #0f3a5f;
            --color-gold: #d4af37;
            --color-dark: #1a1a1a;
            --color-gray: #2c2c2c;
            --color-gray-light: #4a4a4a;
            --color-gray-lighter: #6a6a6a;
            --color-bg: #0d0d0d;
            --color-border: #d4af37;
            --color-success: #2ecc71;
            --color-danger: #e74c3c;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, var(--color-bg) 0%, var(--color-gray) 50%, var(--color-primary) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==================== NAVBAR ==================== */
        .memetic-navbar {
            background: rgba(15, 58, 95, 0.3);
            border-bottom: 2px solid var(--color-gold);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .navbar-logo {
            font-size: 1.5rem;
            color: var(--color-gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .navbar-logo:hover {
            text-shadow: 0 0 10px var(--color-gold);
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            color: var(--color-gold);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .navbar-menu a:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--color-gold);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-login, .btn-signup {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            border-radius: 2px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover, .btn-signup:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 10px var(--color-gold);
        }

        .user-menu-container {
            position: relative;
            display: none;
        }

        .user-menu-container.show {
            display: flex;
        }

        .user-button {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .user-button:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 10px var(--color-gold);
        }

        .user-pfp {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--color-primary);
        }

        .user-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(15, 58, 95, 0.95);
            border: 1px solid var(--color-gold);
            border-radius: 2px;
            min-width: 250px;
            display: none;
            z-index: 100;
        }

        .user-dropdown.show {
            display: block;
        }

        .user-info {
            padding: 16px;
            border-bottom: 1px solid var(--color-gold);
        }

        .user-info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .user-info-label {
            color: var(--color-gray-lighter);
        }

        .user-info-value {
            color: var(--color-gold);
            font-weight: bold;
        }

        .dropdown-action {
            padding: 12px 16px;
            color: var(--color-gold);
            cursor: pointer;
            text-align: center;
            border-bottom: 1px solid var(--color-gold);
            transition: all 0.2s ease;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .dropdown-action:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .dropdown-action:last-child {
            border-bottom: none;
        }

        /* ==================== CONTENT ==================== */
        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            color: var(--color-gold);
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .search-container {
            background: rgba(15, 58, 95, 0.2);
            border: 1px solid var(--color-gold);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--color-gold);
            color: #fff;
            font-family: 'Courier New', monospace;
            border-radius: 2px;
        }

        .search-input::placeholder {
            color: var(--color-gray-lighter);
        }

        .search-results {
            background: rgba(15, 58, 95, 0.2);
            border: 1px solid var(--color-gold);
            border-radius: 4px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 50;
            margin-top: 5px;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--color-gold);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: block;
        }

        .search-result-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .table-container {
            background: rgba(15, 58, 95, 0.2);
            border: 1px solid var(--color-gold);
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            background: rgba(15, 58, 95, 0.4);
            color: var(--color-gold);
            padding: 15px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid var(--color-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        tr:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .rank {
            color: var(--color-gold);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .rank:hover {
            text-shadow: 0 0 10px var(--color-gold);
        }

        .rank.top1 {
            color: #FFD700;
            text-shadow: 0 0 10px #FFD700;
        }

        .rank.top2 {
            color: #C0C0C0;
            text-shadow: 0 0 10px #C0C0C0;
        }

        .rank.top3 {
            color: #CD7F32;
            text-shadow: 0 0 10px #CD7F32;
        }

        .username {
            color: var(--color-gold);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .username:hover {
            text-shadow: 0 0 10px var(--color-gold);
        }

        .wins {
            color: var(--color-success);
            font-weight: bold;
        }

        .losses {
            color: var(--color-danger);
            font-weight: bold;
        }

        .winrate {
            color: var(--color-gold);
            font-weight: bold;
        }

        .points {
            color: var(--color-gold);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .info-box {
            background: rgba(15, 58, 95, 0.2);
            border: 1px solid var(--color-gold);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 30px;
            color: var(--color-gray-lighter);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #0f3a5f 0%, #1a5a8f 100%);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            box-shadow: 0 0 20px var(--color-gold);
        }

        @media (max-width: 768px) {
            .memetic-navbar {
                flex-direction: column;
                gap: 12px;
            }

            .navbar-left {
                width: 100%;
                justify-content: space-between;
            }

            .main-content {
                padding: 20px 15px;
            }

            .page-title {
                font-size: 1.8rem;
            }

            table {
                font-size: 0.75rem;
            }

            th, td {
                padding: 10px 5px;
            }

            .rank {
                font-size: 0.9rem;
            }

            .search-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="memetic-navbar">
        <div class="navbar-left">
            <a class="navbar-logo" onclick="goHome()">🧠 MemeticWars</a>
            <ul class="navbar-menu">
                <li><a onclick="goToResources()">Resources</a></li>
            </ul>
        </div>

        <div class="navbar-right">
            <div class="auth-buttons" id="authButtons">
                <button class="btn-login" onclick="goToLogin()">Login</button>
                <button class="btn-signup" onclick="goToSignup()">Sign Up</button>
            </div>

            <div class="user-menu-container" id="userMenuContainer">
                <button class="user-button" id="userMenuBtn">
                    <div class="user-pfp" id="userPfp">👤</div>
                    <span id="userMenuUsername">User</span>
                    <span>▼</span>
                </button>

                <div class="user-dropdown" id="userDropdown">
                    <div class="user-info">
                        <div class="user-info-item">
                            <span class="user-info-label">Username:</span>
                            <span class="user-info-value" id="dropdownUsername">-</span>
                        </div>
                        <div class="user-info-item">
                            <span class="user-info-label">Email:</span>
                            <span class="user-info-value" id="dropdownEmail">-</span>
                        </div>
                    </div>
                    <div class="dropdown-action" onclick="goToProfile()">👤 Profile</div>
                    <div class="dropdown-action" onclick="logout()">🚪 Logout</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1 class="page-title">🏆 Global Leaderboard</h1>

        <div class="info-box">
            Global ranking of players sorted by points. Use the search below to find your friends.
        </div>

        <div style="position: relative; margin-bottom: 30px;">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="Search player by username..." onkeyup="searchPlayers()">
                <button class="refresh-btn" onclick="loadLeaderboard()">🔄 Refresh</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="table-container">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th style="width: 8%;">#</th>
                        <th style="width: 18%;">Username</th>
                        <th style="width: 12%;">Games</th>
                        <th style="width: 12%;">Wins</th>
                        <th style="width: 12%;">Losses</th>
                        <th style="width: 12%;">Draws</th>
                        <th style="width: 12%;">Winrate</th>
                        <th style="width: 10%;">Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td colspan="8" style="text-align: center; padding: 40px;">Loading rankings...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const CONFIG = {
            NAKAMA_URL: 'https://creature-visiting-playback.ngrok-free.dev',
            SERVER_KEY: 'defaultkey'
        };

        let allPlayers = [];

        function goHome() {
            window.location.href = 'index.html';
        }

        function goToResources() {
            window.location.href = 'memetic-wars-resources.html';
        }

        function goToLogin() {
            window.location.href = 'memetic-wars-login.html';
        }

        function goToSignup() {
            window.location.href = 'memetic-wars-registration.html';
        }

        function goToProfile() {
            window.location.href = 'memetic-wars-profile.html';
        }

        function goToPlayerProfile(username) {
            // TODO: Implementar página de perfil de otro jugador
            alert('Visit ' + username + '\'s profile (feature coming soon)');
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        function initNavbar() {
            const authToken = localStorage.getItem('authToken');
            const username = localStorage.getItem('username');
            const email = localStorage.getItem('email');

            if (authToken && username) {
                showUserMenu(username, email);
            } else {
                showAuthButtons();
            }
        }

        function showAuthButtons() {
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userMenuContainer').classList.remove('show');
        }

        function showUserMenu(username, email) {
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userMenuContainer').classList.add('show');
            document.getElementById('userMenuUsername').textContent = username;
            document.getElementById('dropdownUsername').textContent = username;
            document.getElementById('dropdownEmail').textContent = email;
            document.getElementById('userPfp').textContent = username.charAt(0).toUpperCase();
        }

        document.getElementById('userMenuBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('show');
        });

        document.addEventListener('click', () => {
            document.getElementById('userDropdown').classList.remove('show');
        });

        function loadLeaderboard() {
            const mockData = [
                { rank: 1, username: 'PepeChad', games: 45, wins: 38, losses: 7, draws: 0, winrate: 84.4, points: 2450 },
                { rank: 2, username: 'WojaksRule', games: 52, wins: 41, losses: 11, draws: 0, winrate: 78.8, points: 2120 },
                { rank: 3, username: 'MemeLord', games: 38, wins: 32, losses: 6, draws: 0, winrate: 84.2, points: 1980 },
                { rank: 4, username: 'BasedGamer', games: 61, wins: 43, losses: 18, draws: 0, winrate: 70.5, points: 1850 },
                { rank: 5, username: 'ChadEnergy', games: 29, wins: 24, losses: 5, draws: 0, winrate: 82.8, points: 1650 },
                { rank: 6, username: 'MemeKing99', games: 42, wins: 31, losses: 11, draws: 0, winrate: 73.8, points: 1550 },
                { rank: 7, username: 'PixelMaster', games: 35, wins: 28, losses: 7, draws: 0, winrate: 80.0, points: 1480 },
                { rank: 8, username: 'GoldenPepe', games: 48, wins: 35, losses: 13, draws: 0, winrate: 72.9, points: 1420 },
                { rank: 9, username: 'MemeHunter', games: 56, wins: 39, losses: 17, draws: 0, winrate: 69.6, points: 1350 },
                { rank: 10, username: 'Wojak2024', games: 32, wins: 26, losses: 6, draws: 0, winrate: 81.2, points: 1280 },
                { rank: 11, username: 'BasedKing', games: 44, wins: 32, losses: 12, draws: 0, winrate: 72.7, points: 1200 },
                { rank: 12, username: 'MemeGoblin', games: 39, wins: 29, losses: 10, draws: 0, winrate: 74.4, points: 1150 },
                { rank: 13, username: 'ChadLord88', games: 50, wins: 36, losses: 14, draws: 0, winrate: 72.0, points: 1100 },
                { rank: 14, username: 'PepeForever', games: 28, wins: 21, losses: 7, draws: 0, winrate: 75.0, points: 1050 },
                { rank: 15, username: 'MemeMachine', games: 41, wins: 30, losses: 11, draws: 0, winrate: 73.2, points: 1000 },
            ];

            allPlayers = mockData;
            displayLeaderboard(mockData);
        }

        function displayLeaderboard(data) {
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; padding: 60px;">No ranking data available</td></tr>`;
                return;
            }

            data.forEach((player) => {
                const row = document.createElement('tr');
                
                let rankClass = '';
                if (player.rank === 1) rankClass = 'top1';
                else if (player.rank === 2) rankClass = 'top2';
                else if (player.rank === 3) rankClass = 'top3';

                const icon = player.rank <= 3 ? ['🥇', '🥈', '🥉'][player.rank - 1] : '';

                row.innerHTML = `
                    <td><span class="rank ${rankClass}" onclick="goToPlayerProfile('${player.username}')">${icon} #${player.rank}</span></td>
                    <td><span class="username" onclick="goToPlayerProfile('${player.username}')">${player.username}</span></td>
                    <td>${player.games}</td>
                    <td><span class="wins">${player.wins}</span></td>
                    <td><span class="losses">${player.losses}</span></td>
                    <td>${player.draws}</td>
                    <td><span class="winrate">${player.winrate.toFixed(1)}%</span></td>
                    <td><span class="points">${player.points}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        function searchPlayers() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('searchResults');

            if (query.length < 2) {
                resultsDiv.classList.remove('show');
                return;
            }

            const filtered = allPlayers.filter(p => p.username.toLowerCase().includes(query));

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">No players found</div>';
                resultsDiv.classList.add('show');
                return;
            }

            resultsDiv.innerHTML = filtered.map(p => 
                `<a class="search-result-item" href="javascript:goToPlayerProfile('${p.username}')">#${p.rank} - ${p.username} (${p.points} pts)</a>`
            ).join('');
            resultsDiv.classList.add('show');
        }

        window.addEventListener('DOMContentLoaded', () => {
            initNavbar();
            loadLeaderboard();
        });
    </script>
</body>
</html>
